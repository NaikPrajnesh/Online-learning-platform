server.port=8080
spring.application.name=online-learning-platform

# Default: in-memory H2 (no setup required). Switch profile to mysql for XAMPP.
spring.profiles.active=default

# H2 (embedded, optional persistence during dev)
spring.datasource.url=jdbc:h2:mem:elearn;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Use in-memory store when true (faster demo); JDBC still seeds reference data
app.storage.in-memory=true
