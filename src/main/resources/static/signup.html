<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – EduLearn</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="logo">EduLearn</a>
      <div class="nav-actions">
        <button class="btn btn-icon btn-ghost" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <a href="/login.html" class="btn btn-outline btn-sm">Login</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1 style="margin-bottom:0.5rem">Create account</h1>
      <p style="color:var(--muted);margin-bottom:1.5rem">Join EduLearn and start learning today</p>
      <div id="alert" class="alert" style="display:none"></div>
      <form id="signup-form">
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign up</button>
      </form>
      <p style="margin-top:1rem;text-align:center"><a href="/login.html">Already have an account?</a></p>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      try {
        const res = await Api.signup({
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        Storage.setUser({
          userId: res.userId,
          email: res.email,
          fullName: res.fullName,
          role: res.role
        });
        window.location.href = '/courses.html';
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message;
        alert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
