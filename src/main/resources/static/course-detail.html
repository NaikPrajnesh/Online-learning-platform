<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Detail – EduLearn</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="logo">EduLearn</a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/index.html">Home</a></li>
        <li><a href="/courses.html">Courses</a></li>
        <li><a href="/my-courses.html">My Courses</a></li>
      </ul>
      <div class="nav-actions">
        <button class="btn btn-icon btn-ghost" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <span id="nav-user"></span>
        <span id="nav-auth"></span>
      </div>
    </div>
  </nav>

  <main class="container" id="course-detail-root">
    <p class="empty-state section">Loading course…</p>
  </main>

  <footer class="footer container"><p>© 2026 EduLearn Platform</p></footer>

  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id');

    async function renderDetail() {
      const root = document.getElementById('course-detail-root');
      if (!courseId) {
        root.innerHTML = '<p class="empty-state">Course not found.</p>';
        return;
      }

      let course;
      try {
        course = await Api.getCourse(courseId);
      } catch (e) {
        root.innerHTML = '<p class="empty-state">Course not found or server offline.</p>';
        return;
      }

      document.title = course.title + ' – EduLearn';
      const enrolled = Storage.isEnrolled(courseId);
      let completed = Storage.getProgress(courseId);
      const total = (course.lessons || []).length;
      let percent = Storage.getPercent(courseId, total);

      if (Storage.getUser() && enrolled) {
        try {
          const prog = await Api.getProgress(courseId);
          completed = prog.completedLessonIds || [];
          Storage.setProgress(courseId, completed);
          percent = prog.percentComplete;
        } catch (_) {}
      }

      const firstVideo = (course.lessons || []).find(l => l.videoUrl);

      root.innerHTML = `
        <div class="course-detail">
          <div>
            <div class="detail-banner"><img src="${course.imageUrl}" alt="${escapeHtml(course.title)}"></div>
            <span class="badge">${escapeHtml(course.category)}</span>
            <h1 style="margin:0.75rem 0">${escapeHtml(course.title)}</h1>
            <p style="color:var(--muted);margin-bottom:1rem">Instructor: <strong>${escapeHtml(course.instructor)}</strong> · ${escapeHtml(course.duration)}</p>
            <p>${escapeHtml(course.fullDescription)}</p>

            ${firstVideo ? `
              <h3 style="margin-top:2rem">Lesson preview</h3>
              <div class="video-player">
                <iframe id="lesson-video" src="${firstVideo.videoUrl}" allowfullscreen title="Lesson video"></iframe>
              </div>` : ''}

            <h3 style="margin-top:2rem">Lessons & modules</h3>
            <ul class="lesson-list" id="lesson-list">
              ${(course.lessons || []).map(lesson => {
                const done = completed.includes(Number(lesson.id));
                return `
                  <li class="lesson-item ${done ? 'completed' : ''}" data-lesson-id="${lesson.id}">
                    <input type="checkbox" class="lesson-check" data-id="${lesson.id}" ${done ? 'checked' : ''} ${!enrolled ? 'disabled' : ''}>
                    <div style="flex:1">
                      <div class="lesson-title" style="font-weight:600">${escapeHtml(lesson.title)}</div>
                      <small style="color:var(--muted)">${lesson.durationMinutes} min
                        ${lesson.videoUrl ? ` · <button type="button" class="btn btn-ghost btn-sm play-video" data-url="${lesson.videoUrl}" style="padding:0.2rem 0.5rem">Play video</button>` : ''}
                      </small>
                    </div>
                  </li>`;
              }).join('')}
            </ul>
          </div>

          <aside class="detail-sidebar">
            <h3>Your progress</h3>
            <div class="progress-label"><span>Completion</span><span id="progress-pct">${percent}%</span></div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:${percent}%"></div></div>
            <p style="font-size:0.9rem;color:var(--muted);margin:1rem 0" id="progress-text">${completed.length} of ${total} lessons completed</p>
            <button class="btn btn-primary" style="width:100%" id="enroll-detail-btn" ${enrolled ? 'disabled' : ''}>
              ${enrolled ? 'Enrolled' : 'Enroll now'}
            </button>
            ${percent === 100 && enrolled ? `
              <div id="cert-area">${generateCertificate(course, Storage.getUser(), percent)}</div>
              <button class="btn btn-outline" style="width:100%;margin-top:0.75rem" onclick="downloadCertificate()">Download certificate</button>
            ` : ''}
          </aside>
        </div>`;

      document.getElementById('enroll-detail-btn')?.addEventListener('click', async () => {
        if (!Storage.getUser()) {
          window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
          return;
        }
        Storage.addEnrollment(courseId);
        try {
          await Api.enroll(courseId);
          await Api.syncProgress(courseId, Storage.getProgress(courseId));
        } catch (err) { console.warn(err.message); }
        location.reload();
      });

      root.querySelectorAll('.lesson-check').forEach(cb => {
        cb.addEventListener('change', async () => {
          const lessonId = cb.dataset.id;
          const completedIds = Storage.toggleLesson(courseId, lessonId);
          updateProgressUI(completedIds.length, total);
          if (Storage.getUser()) {
            try {
              const prog = await Api.updateLesson(courseId, lessonId, cb.checked);
              updateProgressUI(prog.completedCount, prog.totalLessons, prog.percentComplete);
              if (prog.percentComplete === 100) location.reload();
            } catch (_) {}
          } else if (completedIds.length === total) location.reload();
        });
      });

      root.querySelectorAll('.play-video').forEach(btn => {
        btn.addEventListener('click', () => {
          const iframe = document.getElementById('lesson-video');
          if (iframe) iframe.src = btn.dataset.url;
        });
      });
    }

    function updateProgressUI(done, total, percent) {
      const pct = percent ?? (total ? Math.round((done / total) * 100) : 0);
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = done + ' of ' + total + ' lessons completed';
    }

    document.addEventListener('DOMContentLoaded', renderDetail);
  </script>
</body>
</html>
