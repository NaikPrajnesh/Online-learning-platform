<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – EduLearn</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="logo">EduLearn</a>
      <div class="nav-actions">
        <button class="btn btn-icon btn-ghost" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1 style="margin-bottom:0.5rem">Welcome back</h1>
      <p style="color:var(--muted);margin-bottom:1.5rem">Log in to sync enrollments with the server</p>
      <div id="alert" class="alert" style="display:none"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="student@elearn.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="student123">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Log in</button>
      </form>
      <p style="margin-top:1rem;text-align:center;font-size:0.9rem">
        Demo: student@elearn.com / student123 · Admin: admin@elearn.com / admin123
      </p>
      <p style="margin-top:0.5rem;text-align:center">
        <a href="/signup.html">Create an account</a>
      </p>
    </div>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      try {
        const res = await Api.login({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        Storage.setUser({
          userId: res.userId,
          email: res.email,
          fullName: res.fullName,
          role: res.role
        });
        const redirect = new URLSearchParams(location.search).get('redirect') || '/my-courses.html';
        window.location.href = redirect;
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message;
        alert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
