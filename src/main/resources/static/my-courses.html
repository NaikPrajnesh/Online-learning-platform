<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses – EduLearn</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="logo">EduLearn</a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/index.html">Home</a></li>
        <li><a href="/courses.html">Courses</a></li>
        <li><a href="/my-courses.html">My Courses</a></li>
      </ul>
      <div class="nav-actions">
        <button class="btn btn-icon btn-ghost" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <span id="nav-user"></span>
        <span id="nav-auth"></span>
      </div>
    </div>
  </nav>

  <main class="container section">
    <div class="section-header">
      <div>
        <h1>My Courses</h1>
        <p>Continue learning where you left off</p>
      </div>
      <a href="/courses.html" class="btn btn-outline btn-sm">Browse more</a>
    </div>
    <div class="course-grid" id="my-courses-grid"></div>
  </main>

  <footer class="footer container"><p>© 2026 EduLearn Platform</p></footer>

  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const grid = document.getElementById('my-courses-grid');
      const enrolledIds = Storage.getEnrollments();

      if (!enrolledIds.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <h3>No enrolled courses yet</h3>
            <p>Enroll in a course to see it here. Progress is saved in your browser.</p>
            <a href="/courses.html" class="btn btn-primary" style="margin-top:1rem">Explore courses</a>
          </div>`;
        return;
      }

      const courses = [];
      for (const id of enrolledIds) {
        try {
          courses.push(await Api.getCourse(id));
        } catch (_) {}
      }

      if (Storage.getUser()) {
        try {
          const server = await Api.getMyEnrollments();
          for (const e of server) {
            if (!courses.find(c => c.id === e.course.id)) courses.push(e.course);
            Storage.setProgress(e.courseId, e.percentComplete === 100
              ? (e.course.lessons || []).map(l => l.id)
              : Storage.getProgress(e.courseId));
          }
        } catch (_) {}
      }

      grid.innerHTML = courses.map(c =>
        renderCourseCard(c, { showEnroll: false, continueLink: true })
      ).join('');
    });
  </script>
</body>
</html>
